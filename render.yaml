services:
  - type: web
    name: wolf-ai-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://YOUR-NETLIFY-SITE.netlify.app
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
