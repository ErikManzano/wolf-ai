services:
  - type: web
    name: wolf-ai-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: FRONTEND_ORIGIN
        value: https://YOUR-NETLIFY-SITE.netlify.app
      - key: DEMO_LOGIN_PASSWORD
        value: wolf2026
      - key: DATABASE_URL
        sync: false
