[build]
  command = "node scripts/prep-netlify-proxy.mjs && npm run build"
  publish = "dist"
  # Opción A (recomendada): proxy sin pelear con CORS
  #   NETLIFY_API_PROXY_TARGET = https://TU-API.onrender.com
  #   VITE_API_URL = /api
  # Opción B: URL directa del API
  #   VITE_API_URL = https://TU-API.onrender.com

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Evita que el navegador/CDN sirvan index.html viejo tras un deploy (assets ya van hasheados).
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
